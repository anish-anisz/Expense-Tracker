<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1 class="app-title">New Tracker</h1>

    <!-- Summary Cards -->
    <div class="summary-grid">
      <div class="summary-card">
        <span class="summary-label">Balance</span>
        <span class="summary-value" id="balance">₹0.00</span>
      </div>
      <div class="summary-card income">
        <span class="summary-label">Total Income</span>
        <span class="summary-value" id="total-income">₹0.00</span>
      </div>
      <div class="summary-card expense">
        <span class="summary-label">Total Expenses</span>
        <span class="summary-value" id="total-expense">₹0.00</span>
      </div>
    </div>

    <div class="main-grid">

      <!-- Add Transaction Form -->
      <div class="card">
        <h2 class="card-title">Add Transaction</h2>
        <div class="form-group">
          <label for="description">Description</label>
          <input type="text" id="description" placeholder="e.g. Lunch at canteen" />
        </div>
        <div class="form-group">
          <label for="amount">Amount (₹)</label>
          <input type="number" id="amount" placeholder="0.00" min="0" step="0.01" />
        </div>
        <div class="form-group">
          <label for="category">Category</label>
          <select id="category">
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Education">Education</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Health">Health</option>
            <option value="Shopping">Shopping</option>
            <option value="Salary">Salary</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Type</label>
          <div class="type-toggle">
            <button class="type-btn active" id="btn-income" onclick="setType('income')">Income</button>
            <button class="type-btn" id="btn-expense" onclick="setType('expense')">Expense</button>
          </div>
        </div>
        <button class="add-btn" onclick="addTransaction()">Add Transaction</button>
        <p class="error-msg" id="error-msg"></p>
      </div>

      <!-- Transaction List -->
      <div class="card">
        <h2 class="card-title">Transactions</h2>
        <div class="filter-row">
          <input type="text" id="search" placeholder="Search transactions..." oninput="renderTransactions()" />
          <select id="filter-category" onchange="renderTransactions()">
            <option value="All">All</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Education">Education</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Health">Health</option>
            <option value="Shopping">Shopping</option>
            <option value="Salary">Salary</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <ul class="tx-list" id="tx-list">
          <!-- Transactions will be rendered here by JavaScript -->
        </ul>
        <p class="empty-msg" id="empty-msg">No transactions yet. Add one above!</p>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
